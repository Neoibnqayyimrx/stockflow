services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockflow}
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow}
    ports:
      - "5432:5432"
    volumes:
      - stockflow-postgres-data:/var/lib/postgresql/data

volumes:
  stockflow-postgres-data:
